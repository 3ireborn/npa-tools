<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVIP Card Generator - NPA Smart System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Montserrat', sans-serif; }
        
        .card-container {
            width: 600px;
            height: 350px;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            border: 2px solid #fbbf24;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.2);
            transform-origin: top center;
        }
        
        .card-container::before {
            content: '';
            position: absolute;
            top: -50px; right: -50px;
            width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(251,191,36,0.4) 0%, transparent 70%);
            border-radius: 50%;
        }
        .card-container::after {
            content: '';
            position: absolute;
            bottom: -50px; left: -50px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(56,189,248,0.2) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        /* DIPERBAIKI: Menggunakan solid color dan shadow agar html2canvas tidak error */
        .gold-text {
            color: #fbbf24;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8), 0 0 8px rgba(251, 191, 36, 0.4);
        }
        
        .photo-frame {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 4px solid #fbbf24;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
            background-color: #1e293b;
        }
        
        .pattern-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.05;
            background-image: radial-gradient(#fbbf24 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #previewContainer {
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">

    <div class="text-center mb-6 mt-4">
        <h1 class="text-2xl font-bold text-yellow-400 mb-1">💳 Mesin Cetak VVIP Card</h1>
        <p class="text-gray-400 text-sm">Alat Khusus CEO NPA Smart System</p>
    </div>

    <!-- Form Input Panel -->
    <div class="bg-slate-800 p-5 rounded-xl shadow-lg w-full max-w-xl mb-8 border border-slate-700">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-sm text-gray-300 mb-1">Nama Mitra</label>
                <input type="text" id="inputName" placeholder="Contoh: YANDI IMANUEL" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white uppercase focus:border-yellow-400 focus:outline-none" oninput="updateCard()">
            </div>
            <div>
                <label class="block text-sm text-gray-300 mb-1">Nomor ID NPA</label>
                <input type="text" id="inputId" placeholder="Contoh: NPA-001" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white uppercase focus:border-yellow-400 focus:outline-none" oninput="updateCard()">
            </div>
        </div>
        <div class="mb-6">
            <label class="block text-sm text-gray-300 mb-1">Upload Foto Terganteng</label>
            <input type="file" id="inputPhoto" accept="image/*" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-yellow-400 file:text-slate-900 hover:file:bg-yellow-500" onchange="loadPhoto(event)">
        </div>
        <button onclick="downloadCard()" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-slate-900 font-bold py-3 rounded-lg shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
            <span>📥 Download Kartu VVIP Sekarang</span>
        </button>
    </div>

    <!-- Preview Container responsif untuk Layar HP -->
    <div id="previewContainer" class="pb-10">
        <div id="vvipCard" class="card-container flex p-8 z-10">
            <div class="pattern-bg z-0"></div>
            
            <!-- Left Side: Photo -->
            <div class="w-1/3 flex flex-col items-center justify-center z-10">
                <img id="cardPhoto" src="https://via.placeholder.com/150/1e293b/fbbf24?text=FOTO" class="photo-frame mb-3" alt="Profile">
                <div class="bg-yellow-400 text-slate-900 text-xs font-bold px-3 py-1 rounded-full">
                    MITRA VVIP
                </div>
            </div>

            <!-- Right Side: Details -->
            <div class="w-2/3 pl-6 flex flex-col justify-center z-10">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="text-yellow-400 font-bold tracking-widest text-sm">3iREBORN</h3>
                        <p class="text-xs text-gray-400">Istikmal Syariah</p>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] text-gray-400 tracking-widest block">MEMBERSHIP</span>
                        <span class="gold-text font-bold italic font-serif text-2xl">Premium</span>
                    </div>
                </div>

                <h1 class="gold-text font-black text-3xl mb-1 truncate" id="cardName">NAMA MITRA</h1>
                <p class="text-gray-300 font-mono tracking-widest text-lg mb-6" id="cardId">ID: NPA-XXX</p>

                <div class="border-t border-slate-600 pt-3 flex justify-between items-end">
                    <div>
                        <p class="text-[9px] text-gray-500 uppercase tracking-widest">Sistem Cerdas</p>
                        <p class="text-xs text-yellow-500 font-bold uppercase">NPA Smart System</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-gray-500 mb-1">Founder & CEO</p>
                        <p class="font-signature text-yellow-400 text-sm" style="font-family: 'Playfair Display', serif;">Sugiarto Kurniawan</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FUNGSI BARU: Membuat kartu responsif di layar HP
        function adjustScale() {
            const card = document.getElementById('vvipCard');
            const container = document.getElementById('previewContainer');
            const screenWidth = window.innerWidth;
            
            // Jika layar HP lebih kecil dari kartu
            if (screenWidth < 640) {
                const scaleValue = (screenWidth - 30) / 600; // 30px untuk margin
                card.style.transform = `scale(${scaleValue})`;
                container.style.height = `${350 * scaleValue}px`; // Sesuaikan tinggi container
            } else {
                card.style.transform = 'scale(1)';
                container.style.height = '350px';
            }
        }

        // Jalankan saat web dibuka dan saat layar dirotasi
        window.onload = adjustScale;
        window.addEventListener('resize', adjustScale);

        function updateCard() {
            document.getElementById('cardName').innerText = document.getElementById('inputName').value || 'NAMA MITRA';
            const idVal = document.getElementById('inputId').value;
            document.getElementById('cardId').innerText = idVal ? `ID: ${idVal}` : 'ID: NPA-XXX';
        }

        function loadPhoto(event) {
            const reader = new FileReader();
            reader.onload = function(){
                document.getElementById('cardPhoto').src = reader.result;
            };
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        function downloadCard() {
            const card = document.getElementById('vvipCard');
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '⏳ Sedang Memproses...';
            
            // Kembalikan ukuran ke asli sebelum difoto agar HD
            card.style.transform = 'scale(1)';

            setTimeout(() => {
                html2canvas(card, {
                    scale: 3, // Resolusi tinggi
                    backgroundColor: null,
                    useCORS: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `VVIP-Card-${document.getElementById('inputId').value || 'NPA'}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                    
                    btn.innerHTML = '✅ Berhasil Diunduh!';
                    btn.classList.add('bg-green-500');
                    
                    // Kecilkan lagi tampilannya untuk layar HP
                    adjustScale();

                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove('bg-green-500');
                    }, 3000);
                });
            }, 100); // Beri jeda 0.1 detik agar CSS scale merespon
        }
    </script>
</body>
</html>
