<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVIP Card Generator - NPA Smart System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        
        .card-container {
            width: 600px;
            height: 350px;
            min-width: 600px;
            min-height: 350px;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            border: 2px solid #fbbf24;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.2);
        }
        
        .card-container::before {
            content: '';
            position: absolute;
            top: -50px; right: -50px;
            width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(251,191,36,0.4) 0%, transparent 70%);
            border-radius: 50%;
        }
        .card-container::after {
            content: '';
            position: absolute;
            bottom: -50px; left: -50px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(56,189,248,0.2) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .gold-text {
            color: #fbbf24;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8), 0 0 8px rgba(251, 191, 36, 0.4);
        }
        
        .photo-frame {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 4px solid #fbbf24;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
            background-color: #1e293b;
        }
        
        .pattern-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.05;
            background-image: radial-gradient(#fbbf24 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Set transform origin ke Pojok Kiri Atas agar tidak nyungsep */
        #scaleWrapper {
            transform-origin: top left;
            transition: transform 0.1s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">

    <div class="text-center mb-6 mt-4">
        <h1 class="text-2xl font-bold text-yellow-400 mb-1">💳 Mesin Cetak VVIP Card</h1>
        <p class="text-gray-400 text-sm">Alat Khusus CEO NPA Smart System</p>
    </div>

    <!-- Form Input Panel -->
    <div class="bg-slate-800 p-5 rounded-xl shadow-lg w-full max-w-xl mb-8 border border-slate-700">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-sm text-gray-300 mb-1">Nama Mitra</label>
                <input type="text" id="inputName" placeholder="Contoh: YANDI IMANUEL" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white uppercase focus:border-yellow-400 focus:outline-none" oninput="updateCard()">
            </div>
            <div>
                <label class="block text-sm text-gray-300 mb-1">Nomor ID NPA</label>
                <input type="text" id="inputId" placeholder="Contoh: NPA-001" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white uppercase focus:border-yellow-400 focus:outline-none" oninput="updateCard()">
            </div>
        </div>
        <div class="mb-6">
            <label class="block text-sm text-gray-300 mb-1">Upload Foto Terganteng</label>
            <input type="file" id="inputPhoto" accept="image/*" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-yellow-400 file:text-slate-900 hover:file:bg-yellow-500" onchange="loadPhoto(event)">
        </div>
        <button onclick="downloadCard()" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-slate-900 font-bold py-3 rounded-lg shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
            <span>📥 Download Kartu VVIP Sekarang</span>
        </button>
    </div>

    <!-- Preview Container dengan Fix Center Layout -->
    <div class="w-full flex justify-center pb-10 overflow-hidden">
        <!-- flexWrapper akan dikendalikan JS untuk mengunci ukurannya pas di tengah -->
        <div id="flexWrapper" style="position: relative;">
            <div id="scaleWrapper">
                <!-- Kartu Asli -->
                <div id="vvipCard" class="card-container flex p-8 z-10 shrink-0">
                    <div class="pattern-bg z-0"></div>
                    
                    <!-- Left Side: Photo -->
                    <div class="w-1/3 flex flex-col items-center justify-center z-10">
                        <img id="cardPhoto" src="https://via.placeholder.com/150/1e293b/fbbf24?text=FOTO" class="photo-frame mb-4" alt="Profile">
                        <div class="bg-yellow-400 text-slate-900 text-xs font-bold px-4 py-1.5 rounded-full shadow-md">
                            MITRA VVIP
                        </div>
                    </div>

                    <!-- Right Side: Details -->
                    <div class="w-2/3 pl-8 flex flex-col justify-center z-10">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="text-yellow-400 font-bold tracking-widest text-sm">3iREBORN</h3>
                                <p class="text-xs text-gray-400 mt-1">Istikmal Syariah</p>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] text-gray-400 tracking-widest block mb-1">MEMBERSHIP</span>
                                <span class="gold-text font-bold italic font-serif text-2xl">Premium</span>
                            </div>
                        </div>

                        <!-- Layout nama aman dari potongan -->
                        <h1 class="gold-text font-black text-[26px] leading-relaxed pb-2 whitespace-nowrap overflow-visible" id="cardName">NAMA MITRA</h1>
                        
                        <p class="text-gray-300 font-mono tracking-widest text-xl mb-6" id="cardId">ID: NPA-XXX</p>

                        <div class="border-t border-slate-600 pt-4 flex justify-between items-end">
                            <div>
                                <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Sistem Cerdas</p>
                                <p class="text-sm text-yellow-500 font-bold uppercase">NPA Smart System</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] text-gray-500 mb-1">Founder & CEO</p>
                                <p class="font-signature text-yellow-400 text-base pb-1" style="font-family: 'Playfair Display', serif;">Sugiarto Kurniawan</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function adjustScale() {
            const flexWrapper = document.getElementById('flexWrapper');
            const wrapper = document.getElementById('scaleWrapper');
            const cardWidth = 600;
            const cardHeight = 350;
            
            // Ambil lebar layar dikurangi padding pinggiran (px-4 = sekitar 32px)
            const screenWidth = window.innerWidth - 32; 
            
            if (screenWidth < cardWidth) {
                // Kalkulasi zoom out agar pas di layar HP
                const scaleValue = screenWidth / cardWidth; 
                wrapper.style.transform = `scale(${scaleValue})`;
                
                // KUNCI UTAMA: Ubah ukuran box luar (flexWrapper) ngikutin skala
                // Biar flexbox tau ukuran aslinya dan bisa ditaruh pas di tengah!
                flexWrapper.style.width = `${cardWidth * scaleValue}px`;
                flexWrapper.style.height = `${cardHeight * scaleValue}px`; 
            } else {
                // Kalau layarnya lega (Laptop/Tablet), balikin ukuran normal
                wrapper.style.transform = 'scale(1)';
                flexWrapper.style.width = `${cardWidth}px`;
                flexWrapper.style.height = `${cardHeight}px`;
            }
        }

        window.onload = adjustScale;
        window.addEventListener('resize', adjustScale);

        function updateCard() {
            const name = document.getElementById('inputName').value;
            document.getElementById('cardName').innerText = name ? name : 'NAMA MITRA';
            const idVal = document.getElementById('inputId').value;
            document.getElementById('cardId').innerText = idVal ? `ID: ${idVal}` : 'ID: NPA-XXX';
        }

        function loadPhoto(event) {
            const reader = new FileReader();
            reader.onload = function(){
                document.getElementById('cardPhoto').src = reader.result;
            };
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        function downloadCard() {
            const card = document.getElementById('vvipCard');
            const wrapper = document.getElementById('scaleWrapper');
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '⏳ Sedang Memproses...';
            
            // 1. Simpan Skala HP Saat Ini
            const currentTransform = wrapper.style.transform;
            
            // 2. KEMBALIKAN KE UKURAN NORMAL AGAR KAMERA FOKUS
            wrapper.style.transform = 'scale(1)';
            
            // 3. Jeda 150ms agar pergerakan render selesai
            setTimeout(() => {
                html2canvas(card, {
                    scale: 3, // Hasil HD
                    backgroundColor: null,
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    // 4. BALIKIN LAGI KE SKALA HP SECARA INSTAN
                    wrapper.style.transform = currentTransform;

                    // Mulai proses download
                    const link = document.createElement('a');
                    link.download = `VVIP-Card-${document.getElementById('inputId').value || 'NPA'}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                    
                    btn.innerHTML = '✅ Berhasil Diunduh!';
                    btn.classList.add('bg-green-500');

                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove('bg-green-500');
                    }, 3000);
                }).catch(err => {
                    wrapper.style.transform = currentTransform;
                    console.error("Gagal cetak kartu:", err);
                    alert("Gagal memproses gambar. Coba lagi.");
                });
            }, 150); 
        }
    </script>
</body>
</html>
