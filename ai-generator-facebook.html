<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Generator Facebook - Prospek</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #001f3f, #003366); color: white; margin:0; padding:20px; }
textarea, input, button, select { width:100%; max-width:700px; margin:10px auto; display:block; padding:12px; border-radius:10px; }
button { background: linear-gradient(90deg, #00b4d8, #0077b6); color:white; font-weight:600; cursor:pointer; }
button:hover { transform:scale(1.03); }
.result { background:rgba(255,255,255,0.1); padding:20px; border-radius:12px; margin:20px auto; max-width:700px; text-align:left; }
</style>
</head>
<body>
<h2>🧠 AI Generator Facebook - Cari Prospek</h2>

<input type="text" id="niche" placeholder="Niche / Produk (contoh: skincare, baju muslim, suplemen)">
<textarea id="target" rows="3" placeholder="Deskripsikan target audience (contoh: ibu rumah tangga umur 25-40, minat kecantikan)"></textarea>
<button onclick="generateFB()">🚀 Generate Semua</button>

<div id="result" class="result" style="display:none;"></div>

<script>
function generateFB() {
  const niche = document.getElementById('niche').value;
  const target = document.getElementById('target').value;
  if (!niche) return alert('Masukkan niche/produk dulu!');

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML = `
    <h3>✅ Hasil untuk: ${niche}</h3>
    <p><strong>1. Caption Iklan Menarik</strong><br>
    "🔥 ${niche} Original Premium! Cocok banget buat ${target}. Sudah ribuan ibu puas! Mau coba?"</p>
    
    <p><strong>2. Ide Targeting Audience</strong><br>
    • Interest: ${niche}, Beauty, Fashion<br>
    • Usia: 24-45 tahun<br>
    • Gender: Perempuan<br>
    • Lokasi: Indonesia (semua kota besar)</p>
    
    <p><strong>3. Script DM Prospek</strong><br>
    "Hai kak, saya lihat kakak tertarik sama ${niche}. Ada yang bisa saya bantu? 😊"</p>
    
    <p><strong>4. Ide Postingan</strong><br>
    • Before-After<br>
    • Testimoni<br>
    • Flash Sale<br>
    • Edukasi singkat</p>
  `;
}
</script>

<a href="ai-tools.html">← Kembali ke Menu Utama</a>
</body>
</html>
