<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Keyword Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #001f3f, #003366); color: white; margin:0; padding:20px; text-align:center; }
input, button { padding:12px; margin:10px; border-radius:10px; width:80%; max-width:500px; }
button { background: linear-gradient(90deg, #00b4d8, #0077b6); color:white; font-weight:600; cursor:pointer; }
.result { background:rgba(255,255,255,0.1); padding:20px; border-radius:12px; margin:20px auto; max-width:700px; text-align:left; display:none; }
</style>
</head>
<body>
<h2>🚀 SEO Keyword Tool</h2>
<input type="text" id="keyword" placeholder="Masukkan topik (contoh: skincare murah)">
<button onclick="generateSEO()">Cari Keyword</button>
<div id="result" class="result"></div>
<a href="ai-tools.html">← Kembali</a>

<script>
function generateSEO() {
  const kw = document.getElementById('keyword').value;
  if (!kw) return alert('Masukkan keyword!');
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML = `<strong>Keyword Utama:</strong> ${kw}<br><br><strong>Keyword Lain:</strong><br>• ${kw} terbaik<br>• review ${kw}<br>• ${kw} original`;
}
</script>
</body>
</html>
