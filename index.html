<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPA SMART ENGINE V4 | VEO EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 pb-20">

    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-black mb-2 tracking-tight">
                🎬 <span class="gradient-text">NPA SMART ENGINE V4</span>
            </h1>
            <p class="text-lg text-slate-400 font-semibold">Veo 3 Optimized Workflow</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-6 rounded-2xl shadow-xl">
                    <h2 class="text-lg font-bold text-blue-400 mb-4 flex items-center gap-2">
                        <i class="fas fa-cogs"></i> Setup Video
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Topik Konten</label>
                            <select id="topic" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-200">
                                <option value="3iReborn">3iReborn (Bisnis)</option>
                                <option value="Istikmal Syariah">Istikmal Syariah (Proteksi)</option>
                                <option value="Cruise">Program Cruise</option>
                                <option value="Melali Bali">Melali Bali</option>
                                <option value="Nasi Bakar Mama Asha">Nasi Bakar Mama Asha</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Aspect Ratio (Format)</label>
                            <select id="ratio" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-200">
                                <option value="9:16">9:16 (Reels/TikTok/Shorts)</option>
                                <option value="16:9">16:9 (YouTube/Landscape)</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Jumlah Scene</label>
                            <select id="sceneCount" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-200">
                                <option value="3">3 Scene</option>
                                <option value="5">5 Scene</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button onclick="showBankIde()" class="w-full py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white font-bold rounded-xl flex items-center justify-center gap-2 transition">
                    <i class="fas fa-lightbulb text-yellow-400"></i> Bank Ide Konten (Untuk Mitra)
                </button>

                <button onclick="generate()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-emerald-600 hover:from-blue-500 hover:to-emerald-500 text-white font-black text-lg rounded-xl shadow-lg transform transition hover:scale-[1.02] flex items-center justify-center gap-2">
                    <i class="fas fa-magic"></i> GENERATE PROMPT
                </button>
            </div>

            <div class="lg:col-span-8">
                <div id="outputContainer" class="space-y-6">
                    <div class="glass-panel p-10 rounded-2xl flex flex-col items-center justify-center text-slate-500 h-full border border-dashed border-slate-700">
                        <i class="fas fa-photo-video text-4xl mb-3 opacity-50"></i>
                        <p>Klik Generate untuk memunculkan blok prompt per scene.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="bankIdeModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl max-w-lg w-full p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-yellow-400">💡 Bank Ide Konten</h3>
                <button onclick="closeBankIde()" class="text-slate-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <p class="text-sm text-slate-300 mb-4">Mitra gabut? Copy "Prompt Sakti" ini dan paste ke Gemini/ChatGPT untuk dapat puluhan ide narasi baru:</p>
            <textarea id="promptSakti" readonly class="w-full h-32 bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-green-300 resize-none">"Buatkan saya 5 kalimat narasi pendek (durasi baca 8 detik per kalimat) dengan gaya bahasa profesional dan emosional. Topiknya tentang [ISI TOPIK, misal: Pentingnya proteksi income dengan 3iReborn]. Buat agar cocok dibacakan sebagai voice-over video sinematik."</textarea>
            <button onclick="copyBankIde()" class="mt-4 w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition">Copy Prompt Sakti</button>
        </div>
    </div>

    <script>
        const topicData = {
            "3iReborn": [
                "3iReborn adalah solusi cerdas membangun aset masa depan tanpa harus kerja keras selamanya.",
                "Sistem ini dirancang agar keuangan keluarga jauh lebih tenang dan terproteksi dari inflasi.",
                "Bergabung di 3iReborn berarti Anda memilih jalan pintas menuju kebebasan waktu.",
                "Biarkan sistem melipatgandakan aset selagi Anda menikmati waktu bersama keluarga.",
                "Wujudkan masa depan mandiri hanya dengan satu keputusan kecil hari ini."
            ],
            "Istikmal Syariah": [
                "Istikmal Syariah memberikan ketenangan hati dengan perlindungan yang sesuai kaidah Islam.",
                "Pilihan paling cerdas bagi keluarga yang ingin merencanakan masa depan tanpa riba.",
                "Tinggalkan keraguan, sistem ini sudah tervalidasi dan sesuai fatwa dewan syariah.",
                "Pastikan setiap rupiah yang dikumpulkan membawa kebaikan dunia dan akhirat.",
                "Lindungi orang-orang tersayang dengan langkah yang tepat dan penuh keberkahan."
            ],
            "Cruise": [
                "Ingin jalan-jalan ke luar negeri gratis? Program Cruise adalah tiket emas Anda.",
                "Nikmati kemewahan kapal pesiar bersama keluarga dari hasil pasif income.",
                "Program ini dirancang untuk mereka yang berani bermimpi dan mengambil aksi nyata.",
                "Ini bukti bahwa kerja cerdas Anda membuahkan hasil yang mewah dan elegan.",
                "Dapatkan tiket petualangan kelas dunia Anda bersama ekosistem bisnis kami."
            ],
            "Melali Bali": [
                "Nikmati keindahan pulau dewata Bali dengan fasilitas eksklusif kelas satu.",
                "Program Melali Bali dirancang khusus untuk kenyamanan total mitra berprestasi.",
                "Wujudkan perjalanan impian Anda ke Bali tanpa membebani kantong pribadi.",
                "Setiap momen di Bali akan menjadi bukti nyata kesuksesan jaringan Anda.",
                "Raih kualifikasinya, kemas koper Anda, dan rayakan kemenangan di Bali."
            ],
            "Nasi Bakar Mama Asha": [
                "Aroma rempah yang dibakar sempurna, menggugah selera sejak gigitan pertama.",
                "Perpaduan bumbu rahasia keluarga dan suwiran lauk yang melimpah ruah.",
                "Dibungkus daun pisang, mengunci kelezatan autentik nusantara di setiap porsinya.",
                "Solusi makan siang praktis dan nikmat untuk menemani hari sibuk Anda.",
                "Rasakan sensasi gurih pedasnya sekarang, awas ketagihan dari suapan pertama!"
            ]
        };

        function generate() {
            const topic = document.getElementById("topic").value;
            const ratio = document.getElementById("ratio").value;
            const sceneCount = parseInt(document.getElementById("sceneCount").value);
            const container = document.getElementById("outputContainer");
            
            container.innerHTML = ''; // Bersihkan container

            for (let i = 1; i <= sceneCount; i++) {
                let narasi = topicData[topic][i - 1];
                
                // Susun prompt khusus Veo 3
                let promptText = `Cinematic portrait shot, ${topic} theme, highly detailed, professional commercial style.\n`;
                promptText += `Aspect Ratio: ${ratio}\n`;
                promptText += `Action: Smooth gimbal tracking, natural movement. Keep hands naturally resting or out of frame to avoid AI distortion.\n`;
                promptText += `Camera: 85mm lens, f/1.8, shallow depth of field, sharp focus.\n`;
                promptText += `Lighting: Rembrandt lighting, volumetric haze, 4k resolution.\n`;
                promptText += `Audio: Dialogue in Indonesian speaking: "${narasi}"`;

                // Buat elemen blok per scene
                const block = document.createElement('div');
                block.className = "glass-panel p-5 rounded-xl relative group transition-all hover:border-blue-500/50";
                
                block.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-blue-400">🎬 Scene ${i}</h3>
                        <button onclick="copyText('prompt_${i}', this)" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-3 py-1.5 rounded-lg flex items-center gap-1 transition">
                            <i class="far fa-copy"></i> Salin
                        </button>
                    </div>
                    <textarea id="prompt_${i}" readonly class="w-full h-40 bg-slate-950 border border-slate-700/50 rounded-lg p-3 text-sm text-emerald-300 resize-none focus:outline-none">${promptText}</textarea>
                `;
                
                container.appendChild(block);
            }
        }

        function copyText(elementId, btnElement) {
            const txt = document.getElementById(elementId);
            txt.select();
            document.execCommand('copy');
            
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = '<i class="fas fa-check"></i> Disalin';
            btnElement.classList.replace('bg-blue-600', 'bg-green-600');
            btnElement.classList.replace('hover:bg-blue-500', 'hover:bg-green-500');
            
            setTimeout(() => {
                btnElement.innerHTML = originalHTML;
                btnElement.classList.replace('bg-green-600', 'bg-blue-600');
                btnElement.classList.replace('hover:bg-green-500', 'hover:bg-blue-500');
            }, 2000);
        }

        // Modal Logic
        function showBankIde() { document.getElementById('bankIdeModal').classList.replace('hidden', 'flex'); }
        function closeBankIde() { document.getElementById('bankIdeModal').classList.replace('flex', 'hidden'); }
        function copyBankIde() {
            const txt = document.getElementById('promptSakti');
            txt.select();
            document.execCommand('copy');
            alert("Prompt Sakti disalin! Silakan paste ke Gemini/ChatGPT.");
        }
    </script>
</body>
</html>
