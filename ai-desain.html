<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desain Otomatis</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #001f3f, #003366); color: white; margin:0; padding:20px; text-align:center; }
input, button { padding:12px; margin:10px; border-radius:10px; width:80%; max-width:500px; }
button { background: linear-gradient(90deg, #00b4d8, #0077b6); color:white; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<h2>🎨 Desain Otomatis</h2>
<input type="text" id="design" placeholder="Deskripsikan desain yang diinginkan">
<button onclick="generateDesign()">Buat Prompt Desain</button>
<div id="result" style="margin:20px auto; max-width:600px; background:rgba(255,255,255,0.1); padding:20px; border-radius:12px; display:none;"></div>
<a href="ai-tools.html">← Kembali</a>

<script>
function generateDesign() {
  const desc = document.getElementById('design').value;
  if (!desc) return alert('Masukkan deskripsi!');
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML = `<p><strong>Prompt siap pakai:</strong><br>"${desc}, modern style, instagram post, high quality, vibrant color"</p>`;
}
</script>
</body>
</html>
